services:             
    tasklist-mysql:
        image: mysql:8.4
        container_name: tasklist-mysql
        restart: always
        environment:
            MYSQL_DATABASE: 'tasklist'
            MYSQL_USER: 'tasklist'
            MYSQL_PASSWORD: 'password'            
            MYSQL_ROOT_PASSWORD: 'password'
        ports:
            - '3309:3306'
        expose:
            - '3306'
        volumes:
            - mysql-db:/var/lib/mysql
            - ./ddl:/docker-entrypoint-initdb.d
volumes: 
    mysql-db:
